name: Deploy to Production

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.4.1'

jobs:
  deploy:
    name: Build & Deploy to Nano
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Sync built files
          rsync -avz --delete dist/ root@$SERVER_IP:/opt/nervix/dist/ \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no"
          # Restart PM2
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@$SERVER_IP \
            "cd /opt/nervix && pm2 restart nervix --update-env"
          # Health check
          sleep 5
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@$SERVER_IP \
            "curl -sf http://localhost:3000/api/trpc/federation.health || (echo '❌ Health check failed' && exit 1)"
          echo "✅ Deploy OK"
