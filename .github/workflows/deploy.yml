name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          npx vite build
          npx esbuild server/_core/index.ts \
            --platform=node \
            --packages=external \
            --bundle \
            --external:vite \
            --external:vite-plugin-jsx-source \
            --format=cjs \
            --outdir=dist

      - name: Deploy to Nano
        env:
          NANO_SSH_KEY: ${{ secrets.NANO_SSH_KEY }}
          NANO_HOST: ${{ secrets.NANO_HOST }}
          NANO_USER: ${{ secrets.NANO_USER }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$NANO_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add host to known_hosts
          ssh-keyscan -H $NANO_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Rsync dist to production
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            $NANO_USER@$NANO_HOST:/opt/nervix/dist/
          
          # Restart PM2
          ssh -i ~/.ssh/deploy_key $NANO_USER@$NANO_HOST "pm2 restart nervix"
          
          # Health check
          sleep 5
          ssh -i ~/.ssh/deploy_key $NANO_USER@$NANO_HOST "curl -s http://localhost:3000/health"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed! Check logs."
