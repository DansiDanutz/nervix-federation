services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OWNER_OPEN_ID=${OWNER_OPEN_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - VITE_APP_ID=${VITE_APP_ID:-nervix}
      - CLAWHUB_API_TOKEN=${CLAWHUB_API_TOKEN:-}
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL:-}
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY:-}
    restart: unless-stopped
    # Security: Network isolation (P3 security fix)
    networks:
      - nervix-internal
    # Security: Resource limits to prevent DoS and container breakout (P3 security fix)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security: Additional hardening (P3 security fix)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/.cache:noexec,nosuid,size=50m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Isolated network for Nervix services (P3 security fix)
networks:
  nervix-internal:
    driver: bridge
    internal: false  # Allow outbound for API calls (Supabase, TON, etc.)
